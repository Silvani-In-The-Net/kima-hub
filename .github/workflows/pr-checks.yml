name: PR Checks

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

jobs:
    lint-frontend:
        name: Lint Frontend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Run ESLint
              working-directory: frontend
              run: npm run lint

    typecheck:
        name: TypeScript Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Typecheck frontend
              working-directory: frontend
              run: |
                  npm ci
                  npm run typecheck

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Typecheck backend
              working-directory: backend
              run: |
                  npm ci
                  npm run typecheck

    unit-tests:
        name: Backend Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              working-directory: backend
              run: npm ci

            - name: Run Jest
              working-directory: backend
              # Exclude webhookEventStore -- it is an integration test requiring
              # a live PostgreSQL database. It runs in integration.yml instead.
              run: npm test -- --passWithNoTests --testPathIgnorePatterns="webhookEventStore"

    audit:
        name: Dependency Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Audit frontend
              working-directory: frontend
              run: |
                  npm ci --ignore-scripts
                  npm audit --audit-level=critical || true

            - name: Audit backend
              working-directory: backend
              run: |
                  npm ci --ignore-scripts
                  npm audit --audit-level=critical || true

    build-docker:
        name: Docker Build Check
        runs-on: ubuntu-latest
        needs: [lint-frontend, typecheck, unit-tests]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image (no push)
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  tags: kima:pr-check
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
